{% extends "base.html" %}
{% block title %}Spotflow — Verify sign-in{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card pw-card border-0 mt-4">
            <div class="card-body p-4 p-md-5">
                <h1 class="h4 fw-bold mb-2">Check your email</h1>
                <p class="text-secondary small mb-4">
                    We sent a 6-digit verification code to <strong>{{ masked_email }}</strong>.
                    Enter the code below to finish signing in. (Demo: no email is sent.)
                </p>

                <form method="POST" action="{{ url_for('login_2fa') }}">
                    <div class="mb-3">
                        <label class="form-label">Verification code</label>
                        <input type="text" name="code" class="form-control form-control-lg text-center"
                               inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code"
                               placeholder="000000" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Continue</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    <a href="{{ url_for('login') }}" class="small text-secondary">Back to sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
