{% from 'macros/logo.html' import logo_mark %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include "partials/favicon.html" %}
    <title>Spotflow — Spot Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        .page {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg {
            position: absolute;
            inset: 0;
            background: url('/static/404.webp') center / cover no-repeat;
            z-index: 0;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(6, 8, 18, 0.58);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
            padding: 48px 52px;
            max-width: 480px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.42);
        }

        .eyebrow {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 18px;
        }

        h1 {
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
            cursor: pointer;
            border: none;
        }

        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: #007AFF;
            color: #fff;
        }

        .btn-outline {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.28);
        }

        .brand {
            position: absolute;
            top: 24px;
            left: 28px;
            z-index: 3;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-mark {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.18);
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="bg"></div>
        <div class="overlay"></div>

        <a href="/" class="brand">
            <span class="brand-mark">{{ logo_mark(30) }}</span>
            Spotflow
        </a>

        <div class="card">
            <span class="eyebrow">Error 404</span>
            <h1>Parking spot not found</h1>
            <p>The page you're looking for has been towed, or never existed. Let's get you back to a valid spot.</p>
            <div class="actions">
                <a href="javascript:history.back()" class="btn btn-outline">← Go back</a>
                <a href="/" class="btn btn-primary">Return home</a>
            </div>
        </div>
    </div>
</body>
</html>
