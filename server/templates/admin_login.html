{% extends "base.html" %}
{% from 'macros/logo.html' import logo_img %}
{% block title %}Spotflow — Admin Sign In{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-12 col-md-6 col-lg-4">
        
        <div class="text-center mb-4">
            <div class="mb-3 d-flex justify-content-center">{{ logo_img(48) }}</div>
            <h2 class="fw-bold fs-3">Admin Sign In</h2>
            <p class="text-secondary small">Sign in to manage devices and fines.</p>
        </div>

        <div class="card pw-card border-0">
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('admin_login') }}">
                    <div class="mb-3">
                        <label class="form-label text-dark">Username</label>
                        <input type="text" name="username" class="form-control" required autofocus placeholder="admin">
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-dark">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-medium rounded-3">Sign In</button>
                </form>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="{{ url_for('login') }}" class="text-secondary small text-decoration-none hover-primary">Driver sign in →</a>
        </div>
        
    </div>
</div>
{% endblock %}
